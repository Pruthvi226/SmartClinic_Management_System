version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smartclinic-db
    environment:
      MYSQL_DATABASE: smartclinic
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: smartclinic-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=smartclinic
      - DB_USER=root
      - DB_PASSWORD=rootpassword
    depends_on:
      db:
        condition: service_healthy
