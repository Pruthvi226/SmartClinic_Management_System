db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smartclinic}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.username=${DB_USER:root}
db.password=${DB_PASSWORD:rootpassword}
db.pool.initialSize=${DB_POOL_INITIAL_SIZE:3}
db.pool.maxTotal=${DB_POOL_MAX_TOTAL:20}
db.pool.maxIdle=${DB_POOL_MAX_IDLE:10}
db.pool.minIdle=${DB_POOL_MIN_IDLE:3}

hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.hbm2ddl.auto=update
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=false
hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory
