# Production Database Configuration
# These values should be overridden with environment variables in production
# See .env.example for the environment variable names

db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
db.username=${DB_USER}
db.password=${DB_PASSWORD}

# Hibernate Configuration - Production
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.hbm2ddl.auto=validate
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=false
hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging - Production (minimal logging)
logging.level.root=WARN
logging.level.com.smartclinic=INFO

# Session Configuration
server.servlet.session.tracking-modes=COOKIE
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
